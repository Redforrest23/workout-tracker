<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palette Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #090909; color: #ddd; padding: 32px 16px; }
  h1 { text-align: center; font-size: 20px; color: #aaa; margin-bottom: 8px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .subtitle { text-align: center; font-size: 13px; color: #555; margin-bottom: 40px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; max-width: 1100px; margin: 0 auto; }

  .card {
    border-radius: 16px; overflow: hidden;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card.current { border-color: #555; }

  .card-label {
    padding: 10px 16px 9px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8;
  }

  .mock { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

  .mock-header {
    border-radius: 10px; padding: 12px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .mock-header-title { font-size: 15px; font-weight: 700; }
  .mock-header-sub { font-size: 11px; margin-top: 2px; }
  .mock-streak { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }

  .mock-ex {
    border-radius: 10px; padding: 12px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .mock-ex-left { display: flex; flex-direction: column; gap: 3px; }
  .mock-ex-name { font-size: 14px; font-weight: 600; }
  .mock-ex-cat { font-size: 11px; }
  .mock-ex-right { display: flex; gap: 6px; align-items: center; }
  .mock-pill { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }

  .mock-btn-row { display: flex; gap: 8px; }
  .mock-btn {
    flex: 1; padding: 11px 0; border-radius: 10px; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer; text-align: center;
  }

  .swatches { display: flex; gap: 0; border-radius: 0 0 14px 14px; overflow: hidden; height: 28px; }
  .swatch { flex: 1; }
</style>
</head>
<body>

<h1>Color Palette Options</h1>
<p class="subtitle">Click any card to copy its CSS variables &nbsp;&middot;&nbsp; <span id="copy-msg" style="color:#5B8DB8"></span></p>

<div class="grid" id="grid"></div>

function buildCssVars(v) {
  return `        :root {\n            --bg:          ${v.bg};\n            --surface:     ${v.surface};\n            --raised:      ${v.raised};\n            --border:      ${v.border};\n            --accent:      ${v.accent};\n            --accent-lt:   ${v.accentLt};\n            --success:     ${v.success};\n            --success-bg:  ${v.successBg};\n            --danger:      ${v.danger};\n            --hard-accent: ${v.hardAccent};\n            --hard-bg:     ${v.hardBg};\n            --hard-border: ${v.hardBorder};\n            --txt:         ${v.txt};\n            --txt-sub:     ${v.txtSub};\n            --txt-muted:   ${v.txtMuted};\n        }`;
}

function buildCard(p) {
  const v = p.vars;
  const card = document.createElement('div');
  card.className = 'card' + (p.id === 'steel-navy' ? ' current' : '');
  card.style.background = v.bg;

  const swatchColors = [v.bg, v.surface, v.raised, v.border, v.accent, v.accentLt, v.success, v.hardAccent, v.danger, v.txt];

  card.innerHTML = `
    <div class="card-label" style="background:${v.surface}; color:${v.accentLt}; border-bottom: 1px solid ${v.border}">
      <span>${p.name}</span>
      <span class="badge" style="background:${v.raised}; color:${v.txtSub}">${p.note}</span>
    </div>
    <div class="mock">
      <div class="mock-header" style="background:${v.surface}; border: 1px solid ${v.border}">
        <div>
          <div class="mock-header-title" style="color:${v.txt}">Wednesday &mdash; Push Day</div>
          <div class="mock-header-sub" style="color:${v.txtSub}">4 exercises &middot; ~35 min</div>
        </div>
        <div class="mock-streak" style="background:${v.raised}; color:${v.accentLt}; border: 1px solid ${v.border}">&nbsp;5 streak</div>
      </div>

      <div class="mock-ex" style="background:${v.surface}; border: 1px solid ${v.border}">
        <div class="mock-ex-left">
          <div class="mock-ex-name" style="color:${v.txt}">Regular Push-ups</div>
          <div class="mock-ex-cat" style="color:${v.txtSub}">Push &middot; 3 sets &times; 10 reps</div>
        </div>
        <div class="mock-pill" style="background:${v.successBg}; color:${v.success}">Done</div>
      </div>

      <div class="mock-ex" style="background:${v.raised}; border: 1px solid ${v.border}">
        <div class="mock-ex-left">
          <div class="mock-ex-name" style="color:${v.txt}">Pike Push-ups</div>
          <div class="mock-ex-cat" style="color:${v.txtSub}">Shoulders &middot; 3 sets &times; 8 reps</div>
        </div>
        <div class="mock-pill" style="background:${v.raised}; color:${v.accentLt}; border: 1px solid ${v.border}">Active</div>
      </div>

      <div class="mock-ex" style="background:${v.hardBg}; border: 1px solid ${v.hardBorder}">
        <div class="mock-ex-left">
          <div class="mock-ex-name" style="color:${v.hardAccent}">Plank &mdash; Hard Mode</div>
          <div class="mock-ex-cat" style="color:${v.txtSub}">Core &middot; 3 sets &times; 45 sec</div>
        </div>
        <div class="mock-pill" style="background:${v.hardBg}; color:${v.hardAccent}; border: 1px solid ${v.hardBorder}">Hard</div>
      </div>

      <div class="mock-btn-row">
        <button class="mock-btn" style="background:${v.accent}; color:#fff">Complete</button>
        <button class="mock-btn" style="background:${v.raised}; color:${v.txtSub}; border: 1px solid ${v.border}">Skip</button>
      </div>
    </div>

    <div class="swatches">
      ${swatchColors.map(c => `<div class="swatch" style="background:${c}" title="${c}"></div>`).join('')}
    </div>
  `;

  card.addEventListener('click', () => {
    navigator.clipboard.writeText(buildCssVars(v));
    document.getElementById('copy-msg').textContent = '"' + p.name + '" CSS variables copied to clipboard';
    setTimeout(() => { document.getElementById('copy-msg').textContent = ''; }, 3000);
  });

  return card;
}

const grid = document.getElementById('grid');
palettes.forEach(p => grid.appendChild(buildCard(p)));
