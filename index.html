<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F1419">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Workout">
    <title>Workout Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><rect width='180' height='180' fill='%230F1419'/><text x='50%' y='50%' font-size='80' text-anchor='middle' dominant-baseline='middle' fill='%235B8DB8'>💪</text></svg>">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg:          #0F1419;
            --surface:     #1A2332;
            --raised:      #1F2B3E;
            --border:      #2A3A52;
            --accent:      #5B8DB8;
            --accent-lt:   #7BA7C9;
            --success:     #5B9E7A;
            --success-bg:  #0E2018;
            --danger:      #A05555;
            --hard-accent: #B87A4A;
            --hard-bg:     #1E1810;
            --hard-border: #3A2810;
            --txt:         #D8E2EC;
            --txt-sub:     #7A8FA0;
            --txt-muted:   #4A6070;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--txt);
            overflow-x: hidden;
        }

        /* ── Auth ──────────────────────────────────────────── */
        .auth-screen {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .auth-container {
            background: var(--surface); border-radius: 16px;
            padding: 32px 28px; width: 100%; max-width: 380px;
            border: 1px solid var(--border);
        }
        .auth-title { font-size: 26px; font-weight: 700; color: var(--accent-lt); margin-bottom: 6px; text-align: center; }
        .auth-subtitle { font-size: 13px; color: var(--txt-muted); margin-bottom: 24px; text-align: center; }
        .auth-input {
            width: 100%; background: var(--raised); color: var(--txt);
            padding: 13px 15px; border-radius: 10px; font-size: 15px;
            border: 1px solid var(--border); margin-bottom: 12px; outline: none;
        }
        .auth-input:focus { border-color: var(--accent); }
        .auth-btn {
            width: 100%; background: var(--accent); padding: 13px; border-radius: 10px;
            border: none; color: #fff; font-weight: 700; font-size: 15px;
            cursor: pointer; margin-bottom: 10px;
        }
        .auth-btn:disabled { background: var(--raised); color: var(--txt-muted); cursor: not-allowed; }
        .auth-btn-secondary { background: var(--raised); color: var(--txt-sub); border: 1px solid var(--border); }
        .auth-error { color: #C47070; font-size: 13px; margin-top: 8px; text-align: center; }
        .auth-success { color: var(--success); font-size: 13px; margin-top: 8px; text-align: center; }
        .loading-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; font-size: 15px; color: var(--txt-muted); }

        /* ── Layout ────────────────────────────────────────── */
        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

        /* ── Header ────────────────────────────────────────── */
        .header { background: var(--surface); padding: 16px 16px 14px; border-bottom: 1px solid var(--border); }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .header-day { font-size: 22px; font-weight: 700; color: var(--txt); letter-spacing: -0.02em; }
        .header-date { font-size: 13px; color: var(--txt-sub); margin-top: 2px; }
        .header-email { font-size: 11px; color: var(--txt-muted); margin-top: 2px; }
        .refresh-btn {
            background: var(--raised); border: 1px solid var(--border); border-radius: 8px;
            width: 34px; height: 34px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 15px; color: var(--txt-muted); flex-shrink: 0;
        }
        .streak-chip {
            display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
            background: var(--raised); border: 1px solid var(--border); border-radius: 20px;
            padding: 5px 12px; font-size: 13px; font-weight: 600; color: var(--accent-lt);
        }
        .streak-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }

        /* ── Button row ────────────────────────────────────── */
        .btn-row {
            display: flex; gap: 8px; padding: 10px 14px;
            background: var(--bg); border-bottom: 1px solid var(--border);
        }
        .btn {
            padding: 9px 14px; border-radius: 9px; border: 1px solid var(--border);
            font-size: 13px; font-weight: 600; cursor: pointer;
            background: var(--surface); color: var(--txt-sub);
        }
        .btn-danger { background: transparent; border-color: var(--danger); color: #C47070; margin-left: auto; }
        .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ── Workout list ──────────────────────────────────── */
        .workout-list { flex: 1; overflow-y: auto; padding: 12px; }
        .progress-wrap { margin-bottom: 14px; }
        .progress-bar-bg { background: var(--raised); border-radius: 4px; height: 4px; overflow: hidden; margin-bottom: 5px; }
        .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
        .progress-label { font-size: 11px; color: var(--txt-muted); text-align: right; }

        /* ── Cards ─────────────────────────────────────────── */
        .card { background: var(--surface); margin-bottom: 10px; border-radius: 14px; padding: 16px; border: 1px solid var(--border); }
        .card.hard-card { border-color: var(--hard-border); }
        .card.done-card { opacity: 0.45; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .ex-info { flex: 1; min-width: 0; }
        .ex-name { font-size: 17px; font-weight: 700; color: var(--txt); }
        .ex-name-done { color: var(--success); }
        .ex-cat { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--txt-muted); margin-top: 3px; }
        .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; margin-left: 12px; }
        .mode-toggle { display: flex; align-items: center; gap: 6px; }
        .mode-label { font-size: 12px; color: var(--txt-muted); }
        .mode-label-active { color: var(--txt); font-weight: 600; }
        .toggle-switch {
            width: 38px; height: 20px; background: var(--accent); border-radius: 10px;
            position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .toggle-switch.on { background: var(--hard-accent); }
        .toggle-switch::after {
            content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%;
            background: #fff; top: 3px; left: 3px; transition: left 0.2s;
        }
        .toggle-switch.on::after { left: 21px; }
        .detail-btn {
            background: none; border: none; color: var(--txt-muted); font-size: 12px;
            cursor: pointer; text-decoration: underline; text-underline-offset: 2px; padding: 0;
        }
        .set-section { background: var(--raised); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
        .set-section.hard-section { background: var(--hard-bg); }
        .section-label { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
        .section-label.hard { color: var(--hard-accent); }
        .set-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
        .set-row:last-child { margin-bottom: 0; }
        .set-num { font-size: 13px; color: var(--txt-sub); width: 46px; flex-shrink: 0; }
        .set-input {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 10px; color: var(--txt); font-size: 14px; outline: none;
        }
        .set-input:focus { border-color: var(--accent); }
        .set-value { flex: 1; font-size: 14px; font-weight: 600; color: var(--success); }
        .complete-btn {
            width: 100%; padding: 13px; border-radius: 10px; border: none;
            font-size: 15px; font-weight: 700; cursor: pointer;
            background: var(--accent); color: #fff; letter-spacing: 0.01em;
        }
        .complete-btn:disabled { background: var(--raised); color: var(--txt-muted); cursor: not-allowed; }
        .complete-btn.hard { background: var(--hard-accent); }
        .done-check { color: var(--success); font-size: 18px; }

        /* ── Completed divider ─────────────────────────────── */
        .completed-divider { display: flex; align-items: center; gap: 10px; margin: 6px 0 10px; }
        .completed-divider::before, .completed-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .completed-divider-text { font-size: 11px; font-weight: 600; color: var(--success); letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; }

        /* ── Center screens ────────────────────────────────── */
        .center-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32px 24px; text-align: center; }
        .center-title { font-size: 22px; font-weight: 700; color: var(--accent-lt); margin-bottom: 10px; }
        .center-text { font-size: 15px; color: var(--txt-sub); line-height: 24px; }

        /* ── Modal ─────────────────────────────────────────── */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.72); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--surface); border-radius: 16px; width: 92%; max-width: 520px;
            max-height: 86vh; border: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .modal-title { font-size: 18px; font-weight: 700; color: var(--txt); }
        .modal-close { font-size: 15px; color: var(--accent); font-weight: 600; background: none; border: none; cursor: pointer; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
        .tab { flex: 1; padding: 11px; background: none; border: none; color: var(--txt-muted); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent-lt); border-bottom-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal-scroll { flex: 1; overflow-y: auto; padding: 16px; }

        /* ── Settings ──────────────────────────────────────── */
        .settings-section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--txt-muted); margin-bottom: 8px; margin-top: 20px; }
        .settings-section-title:first-child { margin-top: 0; }
        .settings-note { font-size: 12px; color: var(--txt-muted); font-style: italic; margin-bottom: 8px; }
        .cat-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 8px 0; user-select: none; }
        .cat-header-left { display: flex; align-items: center; gap: 8px; }
        .cat-arrow { font-size: 11px; color: var(--txt-muted); transition: transform 0.2s; }
        .cat-arrow.collapsed { transform: rotate(-90deg); }
        .cat-name { font-size: 14px; font-weight: 600; color: var(--txt); }
        .toggle-all-btn { background: var(--raised); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--txt-muted); font-size: 12px; font-weight: 600; cursor: pointer; }
        .cat-exercises { overflow: hidden; max-height: 2000px; transition: max-height 0.25s ease; }
        .cat-exercises.collapsed { max-height: 0; }
        .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0 9px 20px; border-bottom: 1px solid var(--border); }
        .settings-row:last-child { border-bottom: none; }
        .settings-ex-name { font-size: 14px; color: var(--txt-sub); flex: 1; }
        .checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
        .track-toggle { display: flex; background: var(--raised); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
        .track-option { flex: 1; padding: 10px; background: none; border: none; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--txt-muted); text-align: center; }
        .track-option.active { background: var(--accent); color: #fff; }
        .rest-day-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .rest-day-btn { background: var(--raised); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--txt-sub); font-size: 13px; font-weight: 600; cursor: pointer; }
        .rest-day-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
        .info-box { background: var(--raised); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
        .info-box-title { font-size: 14px; font-weight: 700; color: var(--txt); margin-bottom: 6px; }
        .info-box-text { font-size: 13px; color: var(--txt-sub); line-height: 20px; }

        /* ── History ───────────────────────────────────────── */
        .history-card { background: var(--raised); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 8px; cursor: pointer; }
        .history-date { font-size: 15px; font-weight: 700; color: var(--accent-lt); margin-bottom: 3px; }
        .history-type { font-size: 13px; color: var(--txt-sub); margin-bottom: 4px; }
        .history-count { font-size: 12px; color: var(--txt-muted); }
        .empty-msg { font-size: 14px; color: var(--txt-muted); text-align: center; margin-top: 24px; }

        /* ── Description modal ─────────────────────────────── */
        .desc-modal-inner {
            background: var(--surface); border-radius: 16px; padding: 22px;
            width: 88%; max-width: 420px; max-height: 75vh;
            border: 1px solid var(--border); overflow-y: auto;
        }
        .desc-name { font-size: 20px; font-weight: 700; color: var(--txt); margin-bottom: 12px; }
        .desc-text { font-size: 14px; color: var(--txt-sub); line-height: 22px; margin-bottom: 14px; }
        .desc-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
        .desc-video-btn { background: var(--accent); color: #fff; }
        .desc-pdf-btn { background: var(--success); color: #fff; }
        .desc-close-btn { background: var(--raised); color: var(--txt-sub); border: 1px solid var(--border); }
        .pdf-note { background: var(--raised); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
        .pdf-note-label { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 2px; }
        .pdf-note-page { font-size: 12px; color: var(--txt-sub); }

        @media (max-width: 480px) {
            .header-day { font-size: 20px; }
            .card { border-radius: 12px; }
        }
    </style>
</head>

    function toLocalDate(d = new Date()) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function parseLocalDate(str) {
        const [y, m, d] = str.split('-').map(Number);
        return new Date(y, m - 1, d);
    }

    const saveWorkoutState = (workout, completedWorkout, log, hardMode) => {

    function getWorkoutSchedule(dayOfWeek, restDay) {
        if (dayOfWeek === restDay) return { name: 'Rest', focus: [], includeCore: false };
        let pos = 0;
        for (let d = 0; d < dayOfWeek; d++) { if (d !== restDay) pos++; }
        return WORKOUT_ROTATION[pos % 6];
    }

    // 1st, 3rd, and 5th non-rest day of the week get mandatory mobility
    function isMobilityDay(dayOfWeek, restDay) {
        if (dayOfWeek === restDay) return false;
        let count = 0;
        for (let d = 0; d <= dayOfWeek; d++) { if (d !== restDay) count++; }
        return count === 1 || count === 3 || count === 5;
    }

    const STRETCH_CATS = ['hipFlexor', 'hamstring', 'hipGlute', 'shoulder', 'backSpine', 'fullBody'];

            { id:'p7', name:'One-Arm Push-up Prog.',     difficulty:7, sets:3, reps:5,  hardSets:3, hardReps:8,  isTime:false, enabled:false, desc:'Progress toward one-arm. Start wide stance, gradually narrow feet.', videoUrl:'https://www.hybridcalisthenics.com/pushups' },

        pull: [
            { id:'pu1', name:'Wall Pull-ups',       difficulty:1, sets:3, reps:8,  hardSets:3, hardReps:12, isTime:false, enabled:true,  desc:'Face wall, hands overhead. Walk feet forward, lean back. Pull toward wall using your back.', videoUrl:null },
            { id:'pu2', name:'Australian Pull-ups', difficulty:2, sets:3, reps:8,  hardSets:4, hardReps:12, isTime:false, enabled:false, desc:'Low bar. Hang underneath, body straight. Pull chest to bar. Lower with control.', videoUrl:'https://www.hybridcalisthenics.com/pullups' },

            setLoading(true); setError(''); setMessage('');
            if (isSignUp) {
                const { error } = await supabase.auth.signUp({ email, password });
                setLoading(false);
                if (error) setError(error.message);
                else setMessage('Check your email to confirm your account!');
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                setLoading(false);
                if (error) setError(error.message);
            }
        };

        return (
            <div className="auth-screen">
                <div className="auth-container">
                    <div className="auth-title">Workout Tracker</div>
                    <div className="auth-subtitle">{isSignUp ? 'Create your account' : 'Sign in to your account'}</div>
                    <form onSubmit={handleSubmit}>
                        <input type="email" className="auth-input" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus />
                        <input type="password" className="auth-input" placeholder="Password (min 6 characters)" value={password} onChange={e => setPassword(e.target.value)} required minLength={6} />
                        <button type="submit" className="auth-btn" disabled={loading}>
                            {loading ? 'Loading…' : (isSignUp ? 'Sign Up' : 'Sign In')}
                        </button>
                    </form>
                    <button className="auth-btn auth-btn-secondary" onClick={() => { setIsSignUp(!isSignUp); setError(''); setMessage(''); }}>
                        {isSignUp ? 'Already have an account? Sign In' : 'Need an account? Sign Up'}
                    </button>
                    {message && <div className="auth-success">{message}</div>}
                    {error   && <div className="auth-error">{error}</div>}
                </div>
            </div>
        );
    }

    // ── Main App ───────────────────────────────────────────────────────────
    function App() {
        const [user, setUser]                         = useState(null);
        const [loading, setLoading]                   = useState(true);
        const [exercises, setExercises]               = useState(DEFAULT_EXERCISES);
        const [workout, setWorkout]                   = useState([]);
        const [completedWorkout, setCompletedWorkout] = useState([]);
        const [log, setLog]                           = useState({});
        const [hardMode, setHardMode]                 = useState({});
        const [showSettings, setShowSettings]         = useState(false);
        const [activeTab, setActiveTab]               = useState('exercises');
        const [showDesc, setShowDesc]                 = useState(false);
        const [showHistory, setShowHistory]           = useState(false);
        const [selectedEx, setSelectedEx]             = useState(null);
        const [date, setDate]                         = useState('');
        const [dayName, setDayName]                   = useState('');
        const [isRest, setIsRest]                     = useState(false);
        const [streak, setStreak]                     = useState(0);
        const [history, setHistory]                   = useState([]);
        const [stretchIndex, setStretchIndex]         = useState(0);
        const [viewingHistory, setViewingHistory]     = useState(null);
        const [showHistoryDetail, setShowHistoryDetail] = useState(false);
        const [workoutComplete, setWorkoutComplete]   = useState(false);
        const [customRestDay, setCustomRestDay]       = useState(6);
        const [restDayPostponed, setRestDayPostponed] = useState(false);
        const [collapsed, setCollapsed]               = useState({});

        useEffect(() => {
            checkUser();
            const { data: listener } = supabase.auth.onAuthStateChange((event, session) => {
                setUser(session?.user ?? null);
                if (session?.user) loadData(session.user.id);
            });
            return () => listener.subscription.unsubscribe();
        }, []);

        useEffect(() => {
            if (user) finishWorkout();
        }, [workout, completedWorkout]);

        const checkUser = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            setUser(session?.user ?? null);
            if (session?.user) await loadData(session.user.id);
            setLoading(false);
        };

        const loadData = async (uid) => {
            try {
                const { data: settingsData } = await supabase
                    .from('exercise_settings').select('exercise_data').eq('user_id', uid).single();

                let exData = DEFAULT_EXERCISES;
                if (settingsData) {
                    const saved = settingsData.exercise_data;
                    exData = {
                        ...DEFAULT_EXERCISES,
                        ...saved,
                        pullDb: saved.pullDb || DEFAULT_EXERCISES.pullDb,
                        stretches: saved.stretches
                            ? { ...DEFAULT_EXERCISES.stretches, ...saved.stretches }
                            : DEFAULT_EXERCISES.stretches,
                    };
                }
                setExercises(exData);

                const { data: profileData } = await supabase
                    .from('user_profiles').select('custom_rest_day').eq('id', uid).single();
                const restDay = profileData ? profileData.custom_rest_day : 6;
                setCustomRestDay(restDay);

                const todayStr = toLocalDate();
                const { data: postponeData } = await supabase
                    .from('rest_day_postponements')
                    .select('*').eq('user_id', uid).eq('postponed_date', todayStr).single();
                const isPostponed = !!postponeData;
                setRestDayPostponed(isPostponed);

                const { data: historyData } = await supabase
                    .from('workout_history').select('*').eq('user_id', uid).order('date', { ascending: false });
                const hist = historyData || [];
                setHistory(hist);
                calculateStreak(hist, restDay);

                const { data: stretchData } = await supabase
                    .from('stretch_categories').select('last_categories').eq('user_id', uid).single();
                let si = 0;
                if (stretchData && typeof stretchData.last_categories === 'number') {
                    si = stretchData.last_categories;
                }
                setStretchIndex(si);

                const d = new Date();
                const dayOfWeek = d.getDay();
                setDate(d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }));

                const isRestDay = isPostponed ? false : dayOfWeek === restDay;
                setIsRest(isRestDay);

                if (isRestDay) {
                    setDayName('Rest');
                } else {
                    const schedule = getWorkoutSchedule(dayOfWeek, restDay);
                    setDayName(schedule.name);
                    const alreadyDone = hist.some(h => h.date === todayStr);
                    if (!alreadyDone) {
                        const saved = localStorage.getItem('currentWorkout');
                        let restored = false;
                        if (saved) {
                            try {
                                const parsed = JSON.parse(saved);
                                if (parsed.date === todayStr && parsed.workout?.length > 0) {
                                    setWorkout(parsed.workout);
                                    setCompletedWorkout(parsed.completedWorkout || []);
                                    setLog(parsed.log || {});
                                    setHardMode(parsed.hardMode || {});
                                    setWorkoutComplete(false);
                                    restored = true;
                                }
                            } catch (e) { /* fall through to generate */ }
                        }
                        if (!restored) generateWorkoutWith(dayOfWeek, exData, si, restDay, uid);
                    } else {
                        setWorkoutComplete(true);
                    }
                }
            } catch (err) {
                console.error('loadData error:', err);
            }
        };

        const calculateStreak = (hist, restDay) => {
            if (!hist || hist.length === 0) { setStreak(0); return; }
            const todayStr = toLocalDate();
            const hasTodayWorkout = hist.some(h => h.date === todayStr);

            let count = 0;
            const check = new Date();
            check.setHours(0, 0, 0, 0);
            if (!hasTodayWorkout) check.setDate(check.getDate() - 1);

            while (count <= 365) {
                const dow = check.getDay();
                if (dow === restDay) { check.setDate(check.getDate() - 1); continue; }
                const ds = toLocalDate(check);
                if (hist.some(h => h.date === ds)) {
                    count++;
                    check.setDate(check.getDate() - 1);
                } else {
                    break;
                }
            }
            setStreak(count);
        };

        const generateWorkout = () => {
            const d = new Date();
            generateWorkoutWith(d.getDay(), exercises, stretchIndex, customRestDay, user?.id);
        };

        const generateWorkoutWith = (dayOfWeek, exData, si, restDay, uid) => {
            const schedule = getWorkoutSchedule(dayOfWeek, restDay);
            if (schedule.focus.length === 0) return;
            const items = [];

            // All mandatory exercises every session — consistent warm-up and wrist prep
            exData.mandatory.filter(e => e.enabled).forEach(e => items.push({ ...e, category: 'Warm-Up' }));

            // Main lift(s)
            schedule.focus.forEach(cat => {
                let pool;
                if (cat === 'pull') {
                    pool = (exData.pullTrack === 'dumbbells' ? exData.pullDb : exData.pull).filter(e => e.enabled);
                } else {
                    pool = (exData[cat] || []).filter(e => e.enabled);
                }
                const catLabel = cat === 'rearDelt' ? 'Rear Delt' : cat === 'legAccessory' ? 'Legs' : schedule.name;
                if (pool.length > 0) items.push({ ...pool[0], category: catLabel });
            });

            // Overhead press on Push days (compound — before core)
            if (schedule.includeShoulder) {
                const pool = (exData.overhead || []).filter(e => e.enabled);
                if (pool.length > 0) items.push({ ...pool[0], category: 'Shoulders' });
            }

            // Core on Push and Legs days (isolation/endurance — after all strength work)
            if (schedule.includeCore) {
                const pool = exData.core.filter(e => e.enabled);
                if (pool.length > 0) items.push({ ...pool[0], category: 'Core' });
            }

            // APT corrective work on mobility days only (exactly 2 exercises)
            if (isMobilityDay(dayOfWeek, restDay)) {
                const aptEnabled = exData.apt.filter(e => e.enabled);
                const aptPool = [...aptEnabled];
                for (let i = 0; i < Math.min(2, aptPool.length); i++) {
                    const idx = Math.floor(Math.random() * aptPool.length);
                    items.push({ ...aptPool[idx], category: 'APT' });
                    aptPool.splice(idx, 1);
                }
            }

            // 1 stretch category per session, rotating through all 6 over the week
            const stretchCat = STRETCH_CATS[si % 6];
            const newSi = (si + 1) % 6;
            const stretchPool = (exData.stretches[stretchCat] || []).filter(e => e.enabled);
            if (stretchPool.length > 0) {
                items.push({ ...stretchPool[Math.floor(Math.random() * stretchPool.length)], category: 'Stretch' });
            }

            saveStretchIndex(newSi, uid);
            setStretchIndex(newSi);
            setWorkout(items);
            setCompletedWorkout([]);
            setLog({});
            setHardMode({});
            setWorkoutComplete(false);
            saveWorkoutState(items, [], {}, {});
        };

        const saveStretchIndex = async (idx, uid) => {
            const id = uid || user?.id;
            if (!id) return;
            const { data: ex } = await supabase.from('stretch_categories').select('id').eq('user_id', id).single();
            if (ex) {
                await supabase.from('stretch_categories').update({ last_categories: idx, updated_at: new Date().toISOString() }).eq('user_id', id);
            } else {
                await supabase.from('stretch_categories').insert({ user_id: id, last_categories: idx });
            }
        };

        const saveExerciseSettings = async (data, uid) => {
            const id = uid || user?.id;
            if (!id) return;
            const { data: ex } = await supabase.from('exercise_settings').select('id').eq('user_id', id).single();
            if (ex) {
                await supabase.from('exercise_settings').update({ exercise_data: data, updated_at: new Date().toISOString() }).eq('user_id', id);
            } else {
                await supabase.from('exercise_settings').insert({ user_id: id, exercise_data: data });
            }
        };

        const saveWorkoutToHistory = async () => {
            if (!user) return;
            try {
                const todayStr = toLocalDate();
                const payload = {
                    user_id: user.id,
                    date: todayStr,
                    workout_type: dayName,
                    exercises: [...workout, ...completedWorkout].map(ex => {
                        const isHard = hardMode[ex.id];
                        const prefix = isHard ? 'hard' : 'reg';
                        const numSets = isHard ? ex.hardSets : ex.sets;
                        return {
                            ...ex, isHard,
                            loggedSets: Array.from({ length: numSets }, (_, i) => log[`${ex.id}-${prefix}-${i}`] || '0'),
                        };
                    }),
                };
                const { data, error } = await supabase.from('workout_history').insert(payload).select().single();
                if (error) throw error;
                const updated = [data, ...history];
                setHistory(updated);
                calculateStreak(updated, customRestDay);
                setWorkoutComplete(true);
                localStorage.removeItem('currentWorkout');
            } catch (err) {
                console.error('saveWorkoutToHistory error:', err);
            }
        };

        const finishWorkout = () => {
            if (workout.length === 0 && completedWorkout.length > 0 && !workoutComplete) {
                saveWorkoutToHistory();
            }
        };

        const toggleEx = async (category, id) => {
            const updated = JSON.parse(JSON.stringify(exercises));
            if (category === 'stretches') {
                for (const sub of Object.keys(updated.stretches)) {
                    const ex = updated.stretches[sub].find(e => e.id === id);
                    if (ex) { ex.enabled = !ex.enabled; break; }
                }
            } else {
                const ex = updated[category]?.find(e => e.id === id);
                if (ex) ex.enabled = !ex.enabled;
            }
            setExercises(updated);
            await saveExerciseSettings(updated);
        };

        const toggleAllInCategory = async (category, sub = null) => {
            const updated = JSON.parse(JSON.stringify(exercises));
            const list = sub ? updated.stretches[sub] : updated[category];
            const allOn = list.every(e => e.enabled);
            list.forEach(e => { e.enabled = !allOn; });
            setExercises(updated);
            await saveExerciseSettings(updated);
        };

        const changePullTrack = async (track) => {
            const updated = { ...exercises, pullTrack: track };
            setExercises(updated);
            await saveExerciseSettings(updated);
        };

        const changeRestDay = async (day) => {
            setCustomRestDay(day);
            await supabase.from('user_profiles').update({ custom_rest_day: day, updated_at: new Date().toISOString() }).eq('id', user.id);
        };

        const postponeRestDay = async () => {
            if (!user) return;
            if (window.confirm("Move rest day to tomorrow and work out today instead?")) {
                await supabase.from('rest_day_postponements').insert({ user_id: user.id, postponed_date: toLocalDate() });
                window.location.reload();
            }
        };

        const logRep = (id, key, value) => setLog(prev => {
            const next = { ...prev, [`${id}-${key}`]: value };
            saveWorkoutState(workout, completedWorkout, next, hardMode);
            return next;
        });
        const toggleHardMode = (id) => setHardMode(prev => {
            const next = { ...prev, [id]: !prev[id] };
            saveWorkoutState(workout, completedWorkout, log, next);
            return next;
        });
        const toggleCollapsed = (key) => setCollapsed(prev => ({ ...prev, [key]: !prev[key] }));

        const isComplete = (ex) => {
            const isHard = hardMode[ex.id];
            const numSets = isHard ? ex.hardSets : ex.sets;
            const prefix = isHard ? 'hard' : 'reg';
            for (let i = 0; i < numSets; i++) {
                if (!log[`${ex.id}-${prefix}-${i}`]?.trim()) return false;
            }
            return true;
        };

        const completeExercise = (ex) => {
            const nextWorkout = workout.filter(e => e.id !== ex.id);
            const nextCompleted = [...completedWorkout, ex];
            setWorkout(nextWorkout);
            setCompletedWorkout(nextCompleted);
            saveWorkoutState(nextWorkout, nextCompleted, log, hardMode);
        };

        const handleLogout = async () => { await supabase.auth.signOut(); setUser(null); };

        if (loading) return <div className="loading-screen">Loading…</div>;
        if (!user)   return <AuthScreen />;

        // ── Modals ─────────────────────────────────────────────────────────
        const renderExerciseSection = (label, category, sub = null, note = null) => {
            const key = sub || category;
            const list = sub ? exercises.stretches[sub] : exercises[category];
            return (
                <div key={key}>
                    <div className="cat-header" onClick={() => toggleCollapsed(key)}>
                        <div className="cat-header-left">
                            <span className={`cat-arrow ${collapsed[key] ? 'collapsed' : ''}`}>▼</span>
                            <span className="cat-name">{label}</span>
                        </div>
                        <button className="toggle-all-btn" onClick={e => { e.stopPropagation(); toggleAllInCategory(category, sub); }}>Toggle All</button>
                    </div>
                    {note && <div className="settings-note">{note}</div>}
                    <div className={`cat-exercises ${collapsed[key] ? 'collapsed' : ''}`}>
                        {list.map(ex => (
                            <div key={ex.id} className="settings-row">
                                <span className="settings-ex-name">{ex.name}</span>
                                <input type="checkbox" className="checkbox" checked={ex.enabled} onChange={() => toggleEx(category, ex.id)} />
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const modals = (
            <>
                {/* Settings */}
                <div className={`modal ${showSettings ? 'show' : ''}`}>
                    <div className="modal-content" style={{ height: '86vh' }}>
                        <div className="modal-header">
                            <span className="modal-title">Settings</span>
                            <button className="modal-close" onClick={() => setShowSettings(false)}>Done</button>
                        </div>
                        <div className="tabs">
                            {['exercises','schedule','about'].map(t => (
                                <button key={t} className={`tab ${activeTab === t ? 'active' : ''}`} onClick={() => setActiveTab(t)}>
                                    {t.charAt(0).toUpperCase() + t.slice(1)}
                                </button>
                            ))}
                        </div>
                        <div className="modal-scroll">
                            <div className={`tab-content ${activeTab === 'exercises' ? 'active' : ''}`}>
                                <div className="settings-section-title">Mandatory Mobility (3× / week)</div>
                                {renderExerciseSection('Mobility', 'mandatory', null, 'Appears on 3 evenly-spaced workout days each week')}
                                <div className="settings-section-title">Main Lifts</div>
                                {renderExerciseSection('Push', 'push')}
                                {renderExerciseSection('Shoulders (Push days)', 'overhead', null, 'Overhead press — appears on every Push day')}
                                {renderExerciseSection('Pull — Bar Track', 'pull', null, 'Active when Pull Track is set to Bar')}
                                {renderExerciseSection('Pull — Dumbbell Track', 'pullDb', null, 'Active when Pull Track is set to Dumbbells')}
                                {renderExerciseSection('Rear Delt (Pull days)', 'rearDelt', null, 'Posture work — appears on every Pull day')}
                                {renderExerciseSection('Legs', 'squats')}
                                {renderExerciseSection('Legs Accessory (every Legs day)', 'legAccessory', null, 'Always appears on Legs days — adductor/accessory work')}
                                {renderExerciseSection('Core', 'core')}
                                <div className="settings-section-title">Corrective & Mobility</div>
                                {renderExerciseSection('APT Correction', 'apt', null, 'Rotates 2 exercises on mobility days (Sun / Tue / Thu)')}
                                <div className="settings-section-title">Stretching (rotates through all categories)</div>
                                {renderExerciseSection('Hip Flexor', 'stretches', 'hipFlexor')}
                                {renderExerciseSection('Hamstring', 'stretches', 'hamstring')}
                                {renderExerciseSection('Hip / Glute', 'stretches', 'hipGlute')}
                                {renderExerciseSection('Shoulder', 'stretches', 'shoulder')}
                                {renderExerciseSection('Back / Spine', 'stretches', 'backSpine')}
                                {renderExerciseSection('Full Body', 'stretches', 'fullBody')}
                            </div>

                            <div className={`tab-content ${activeTab === 'schedule' ? 'active' : ''}`}>
                                <div className="settings-section-title">Pull Track</div>
                                <div className="info-box" style={{ marginBottom: 12 }}>
                                    <div className="info-box-text">Choose which pull exercises to use. Switch when your equipment changes.</div>
                                </div>
                                <div className="track-toggle">
                                    <button className={`track-option ${exercises.pullTrack !== 'dumbbells' ? 'active' : ''}`} onClick={() => changePullTrack('bar')}>Bar / Pull-ups</button>
                                    <button className={`track-option ${exercises.pullTrack === 'dumbbells' ? 'active' : ''}`} onClick={() => changePullTrack('dumbbells')}>Dumbbells</button>
                                </div>

                                <div className="settings-section-title">Rest Day</div>
                                <div className="rest-day-options">
                                    {DAYS_OF_WEEK.map((day, i) => (
                                        <button key={i} className={`rest-day-btn ${customRestDay === i ? 'selected' : ''}`} onClick={() => changeRestDay(i)}>{day}</button>
                                    ))}
                                </div>

                                <div className="settings-section-title" style={{ marginTop: 20 }}>Current Schedule</div>
                                <div className="info-box">
                                    <div className="info-box-text">
                                        {DAYS_OF_WEEK.map((day, i) => (
                                            <div key={i}>
                                                <strong>{day}:</strong>{' '}
                                                {i === customRestDay ? 'Rest Day' : getWorkoutSchedule(i, customRestDay).name + ' Day'}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className={`tab-content ${activeTab === 'about' ? 'active' : ''}`}>
                                <div className="info-box">
                                    <div className="info-box-title">Workout Tracker</div>
                                    <div className="info-box-text">A progressive calisthenics tracker with automatic daily workout generation, cloud sync, and adaptive scheduling.</div>
                                </div>
                                <div className="info-box">
                                    <div className="info-box-title">How It Works</div>
                                    <div className="info-box-text">
                                        Each day generates one main lift (at your current difficulty), mandatory mobility 3× per week, 2–3 APT correction exercises, and stretches that rotate through all 6 body areas over 3 sessions. Complete all sets to log the workout.
                                    </div>
                                </div>
                                <div className="info-box">
                                    <div className="info-box-title">Pull Track</div>
                                    <div className="info-box-text">Switch between bar pull-ups and dumbbell rows in Settings → Schedule. Enable the difficulty level you're currently working at in the Exercises list.</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                {/* History list */}
                <div className={`modal ${showHistory ? 'show' : ''}`}>
                    <div className="modal-content" style={{ height: '86vh' }}>
                        <div className="modal-header">
                            <span className="modal-title">History</span>
                            <button className="modal-close" onClick={() => setShowHistory(false)}>Done</button>
                        </div>
                        <div className="modal-scroll">
                            {history.length === 0 && <div className="empty-msg">No workouts logged yet.</div>}
                            {history.map((h, i) => (
                                <div key={i} className="history-card" onClick={() => { setViewingHistory(h); setShowHistoryDetail(true); setShowHistory(false); }}>
                                    <div className="history-date">{parseLocalDate(h.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
                                    <div className="history-type">{h.workout_type} Day</div>
                                    <div className="history-count">{h.exercises.length} exercises · tap to view</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>

                {/* History detail */}
                <div className={`modal ${showHistoryDetail ? 'show' : ''}`}>
                    <div className="modal-content" style={{ height: '86vh' }}>
                        <div className="modal-header">
                            <span className="modal-title">Workout Details</span>
                            <button className="modal-close" onClick={() => { setShowHistoryDetail(false); setShowHistory(true); }}>Back</button>
                        </div>
                        <div className="modal-scroll">
                            {viewingHistory && (
                                <>
                                    <div className="info-box">
                                        <div className="info-box-title">{parseLocalDate(viewingHistory.date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</div>
                                        <div className="info-box-text">{viewingHistory.workout_type} Day · {viewingHistory.exercises.length} exercises</div>
                                    </div>
                                    {viewingHistory.exercises.map((ex, i) => (
                                        <div key={i} className={`card ${ex.isHard ? 'hard-card' : ''} done-card`} style={{ opacity: 1 }}>
                                            <div className="card-top" style={{ marginBottom: 8 }}>
                                                <div className="ex-info">
                                                    <div className="ex-name">{ex.name}</div>
                                                    <div className="ex-cat">{ex.category}</div>
                                                </div>
                                            </div>
                                            <div className={`set-section ${ex.isHard ? 'hard-section' : ''}`}>
                                                <div className={`section-label ${ex.isHard ? 'hard' : ''}`}>{ex.isHard ? 'Hard Mode' : 'Regular Mode'}</div>
                                                {ex.loggedSets.map((val, si) => (
                                                    <div key={si} className="set-row">
                                                        <span className="set-num">Set {si + 1}</span>
                                                        <span className="set-value">{val} {ex.isTime ? 'sec' : 'reps'}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </>
                            )}
                        </div>
                    </div>
                </div>

                {/* Description */}
                <div className={`modal ${showDesc ? 'show' : ''}`} onClick={() => setShowDesc(false)}>
                    <div className="desc-modal-inner" onClick={e => e.stopPropagation()}>
                        {selectedEx && (
                            <>
                                <div className="desc-name">{selectedEx.name}</div>
                                <div className="desc-text">{selectedEx.desc}</div>
                                {selectedEx.videoUrl && (
                                    <button className="desc-btn desc-video-btn" onClick={() => window.open(selectedEx.videoUrl, '_blank')}>Watch Video Tutorial</button>
                                )}
                                {selectedEx.pdfUrl && (
                                    <>
                                        <div className="pdf-note">
                                            <div className="pdf-note-label">Movement by David — Stretching Program</div>
                                            {selectedEx.pdfPage && <div className="pdf-note-page">See: {selectedEx.pdfPage}</div>}
                                        </div>
                                        <button className="desc-btn desc-pdf-btn" onClick={() => window.open(selectedEx.pdfUrl, '_blank')}>Open PDF Guide</button>
                                    </>
                                )}
                                <button className="desc-btn desc-close-btn" onClick={() => setShowDesc(false)}>Close</button>
                            </>
                        )}
                    </div>
                </div>
            </>
        );

        // ── Shared header + buttons ────────────────────────────────────────
        const header = (title, showRefresh = false) => (
            <div className="header">
                <div className="header-top">
                    <div>
                        <div className="header-day">{title}</div>
                        <div className="header-date">{date}</div>
                        <div className="header-email">{user.email}</div>
                    </div>
                    {showRefresh && (
                        <button className="refresh-btn" onClick={generateWorkout} title="Regenerate workout">↺</button>
                    )}
                </div>
                <div className="streak-chip">
                    <span className="streak-dot"></span>
                    {streak} day streak
                </div>
            </div>
        );

        const buttons = (extraBtns = null) => (
            <div className="btn-row">
                <button className="btn" onClick={() => setShowSettings(true)}>Settings</button>
                <button className="btn" onClick={() => setShowHistory(true)}>History</button>
                {extraBtns}
                <button className="btn btn-danger" onClick={handleLogout}>Logout</button>
            </div>
        );

        // ── Rest day view ──────────────────────────────────────────────────
        if (isRest) {
            return (
                <div className="container">
                    {header('Rest Day')}
                    {buttons(<button className="btn btn-accent" onClick={postponeRestDay}>Train Today</button>)}
                    <div className="center-screen">
                        <div className="center-title">{DAYS_OF_WEEK[new Date().getDay()]} — Rest Day</div>
                        <div className="center-text">Recovery is where you get stronger.<br />See you tomorrow.</div>
                    </div>
                    {modals}
                </div>
            );
        }

        // ── Workout complete view ──────────────────────────────────────────
        if (workoutComplete) {
            return (
                <div className="container">
                    {header(`${dayName} Day`)}
                    {buttons()}
                    <div className="center-screen">
                        <div className="center-title">Done for Today</div>
                        <div className="center-text">Great work. Today's {dayName} session is logged.</div>
                    </div>
                    {modals}
                </div>
            );
        }

        // ── Main workout view ──────────────────────────────────────────────
        const total = workout.length + completedWorkout.length;
        const done  = completedWorkout.length;
        const pct   = total > 0 ? (done / total) * 100 : 0;

        return (
            <div className="container">
                {header(`${dayName} Day`, true)}
                {buttons()}
                <div className="workout-list">
                    <div className="progress-wrap">
                        <div className="progress-bar-bg">
                            <div className="progress-bar-fill" style={{ width: `${pct}%` }}></div>
                        </div>
                        <div className="progress-label">{done} / {total} complete</div>
                    </div>

                    {workout.map(ex => {
                        const isHard = hardMode[ex.id];
                        const prefix = isHard ? 'hard' : 'reg';
                        const numSets = isHard ? ex.hardSets : ex.sets;
                        const reps = isHard ? ex.hardReps : ex.reps;
                        const unit = ex.isTime ? 'sec' : 'reps';
                        return (
                            <div key={ex.id} className={`card ${isHard ? 'hard-card' : ''}`}>
                                <div className="card-top">
                                    <div className="ex-info">
                                        <div className="ex-name">{ex.name}</div>
                                        <div className="ex-cat">{ex.category}</div>
                                    </div>
                                    <div className="card-right">
                                        <div className="mode-toggle">
                                            <span className={`mode-label ${!isHard ? 'mode-label-active' : ''}`}>Reg</span>
                                            <div className={`toggle-switch ${isHard ? 'on' : ''}`} onClick={() => toggleHardMode(ex.id)}></div>
                                            <span className={`mode-label ${isHard ? 'mode-label-active' : ''}`}>Hard</span>
                                        </div>
                                        <button className="detail-btn" onClick={() => { setSelectedEx(ex); setShowDesc(true); }}>Details</button>
                                    </div>
                                </div>
                                <div className={`set-section ${isHard ? 'hard-section' : ''}`}>
                                    <div className={`section-label ${isHard ? 'hard' : ''}`}>{numSets} sets × {reps} {unit}{isHard ? ' — Hard Mode' : ''}</div>
                                    {Array.from({ length: numSets }).map((_, i) => (
                                        <div key={i} className="set-row">
                                            <span className="set-num">Set {i + 1}</span>
                                            <input
                                                type="number"
                                                className="set-input"
                                                placeholder={unit}
                                                value={log[`${ex.id}-${prefix}-${i}`] || ''}
                                                onChange={e => logRep(ex.id, `${prefix}-${i}`, e.target.value)}
                                            />
                                        </div>
                                    ))}
                                </div>
                                <button
                                    className={`complete-btn ${isHard ? 'hard' : ''}`}
                                    disabled={!isComplete(ex)}
                                    onClick={() => completeExercise(ex)}
                                >
                                    {isComplete(ex) ? 'Mark Complete' : 'Fill All Sets to Complete'}
                                </button>
                            </div>
                        );
                    })}

                    {completedWorkout.length > 0 && (
                        <>
                            <div className="completed-divider">
                                <span className="completed-divider-text">Completed — {done} of {total}</span>
                            </div>
                            {completedWorkout.map(ex => {
                                const isHard = hardMode[ex.id];
                                const prefix = isHard ? 'hard' : 'reg';
                                const numSets = isHard ? ex.hardSets : ex.sets;
                                return (
                                    <div key={ex.id} className="card done-card">
                                        <div className="card-top" style={{ marginBottom: 8 }}>
                                            <div className="ex-info">
                                                <div className={`ex-name ex-name-done`}>{ex.name}</div>
                                                <div className="ex-cat">{ex.category}</div>
                                            </div>
                                            <span className="done-check">✓</span>
                                        </div>
                                        <div className={`set-section ${isHard ? 'hard-section' : ''}`}>
                                            <div className={`section-label ${isHard ? 'hard' : ''}`}>{isHard ? 'Hard Mode' : 'Regular Mode'}</div>
                                            {Array.from({ length: numSets }).map((_, i) => (
                                                <div key={i} className="set-row">
                                                    <span className="set-num">Set {i + 1}</span>
                                                    <span className="set-value">{log[`${ex.id}-${prefix}-${i}`]} {ex.isTime ? 'sec' : 'reps'}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </>
                    )}
                </div>
                {modals}
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
